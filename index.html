<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot Coffee Delivery — HRI Simulation v3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;600&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0a0e17;--panel:#111827;--panel2:#1a2235;
    --accent:#00d4ff;--accent2:#ff6b35;--green:#00e5a0;
    --yellow:#ffd166;--text:#e8edf5;--muted:#6b7a99;
    --border:#1e2d45;--rb:#1e3a5f;--rj:#2563eb;--rh:#3b82f6;
  }
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;padding:24px 20px 32px}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
  .logo{font-family:'Space Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;display:flex;align-items:center;gap:8px}
  .logo::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:blink 2s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  .stage-nav{display:flex;gap:4px;margin-bottom:20px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:6px}
  .stage-btn{flex:1;padding:9px 8px;border-radius:8px;border:none;background:transparent;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);cursor:pointer;transition:all .25s;text-align:center;letter-spacing:.05em}
  .stage-btn .num{display:block;font-size:13px;font-weight:700;margin-bottom:3px;color:var(--border);transition:color .25s}
  .stage-btn.active{background:var(--accent);color:#000}
  .stage-btn.active .num{color:#000}
  .stage-btn.done{color:var(--green)}
  .stage-btn.done .num{color:var(--green)}
  .scene-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:16px}
  .scene-canvas{width:100%;height:300px;position:relative;overflow:hidden;background:radial-gradient(ellipse at 30% 60%,#0d1f3c 0%,#060c18 100%)}
  canvas{width:100%;height:100%;display:block}
  .scene-info{padding:16px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--panel2)}
  .scene-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:.1em;margin-bottom:4px}
  .scene-title{font-size:14px;font-weight:600;color:var(--text);line-height:1.4}
  .nav-btns{display:flex;gap:8px;flex-shrink:0}
  .nav-btn{padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:transparent;font-family:'Space Mono',monospace;font-size:11px;color:var(--text);cursor:pointer;transition:all .2s}
  .nav-btn:hover:not(:disabled){background:var(--accent);color:#000;border-color:var(--accent)}
  .nav-btn:disabled{opacity:.25;cursor:not-allowed}
  .status-bar{display:flex;gap:8px;flex-wrap:wrap}
  .chip{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:11px;font-family:'Space Mono',monospace;border:1px solid var(--border);background:var(--panel);color:var(--muted);letter-spacing:.03em}
  .chip.active{border-color:var(--green);color:var(--green);background:rgba(0,229,160,.06)}
  .chip.pending{border-color:var(--yellow);color:var(--yellow);background:rgba(255,209,102,.06)}
  .chip .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
  .chip.active .dot{box-shadow:0 0 6px currentColor;animation:blink 1.5s infinite}
  .state-hud{position:absolute;top:10px;right:10px;font-family:'Space Mono',monospace;font-size:9px;color:var(--accent);opacity:.8;text-align:right;pointer-events:none}
</style>
</head>
<body>

<div class="header">
  <div class="logo">Robot Coffee Delivery — HRI Sim v3</div>
</div>

<div class="stage-nav" id="stage-nav">
  <button class="stage-btn active" onclick="goTo(0)"><span class="num">①</span>로봇팔 제조</button>
  <button class="stage-btn" onclick="goTo(1)"><span class="num">②</span>AMR 이동</button>
  <button class="stage-btn" onclick="goTo(2)"><span class="num">③</span>책상 배달</button>
  <button class="stage-btn" onclick="goTo(3)"><span class="num">④</span>손 전달</button>
</div>

<div class="scene-card">
  <div class="scene-canvas" id="scene-canvas">
    <canvas id="c" width="700" height="300"></canvas>
    <div class="state-hud" id="state-hud"></div>
  </div>
  <div class="scene-info">
    <div>
      <div class="scene-label" id="scene-label">STAGE 01 / 04</div>
      <div class="scene-title" id="scene-title">6축 로봇팔이 커피를 제조합니다</div>
    </div>
    <div class="nav-btns">
      <button class="nav-btn" id="btn-prev" onclick="goTo(currentStage-1)" disabled>← PREV</button>
      <button class="nav-btn" id="btn-next" onclick="goTo(currentStage+1)">NEXT →</button>
    </div>
  </div>
</div>

<div class="status-bar" id="status-bar"></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let currentStage = 0;
let animId = null;
let stageT = 0; // global time within stage (seconds)
let lastTs = null;

// ── Color palette ──
const C = {
  bg:'#060c18', floor:'#1e2d45', accent:'#00d4ff', green:'#00e5a0',
  yellow:'#ffd166', muted:'#6b7a99', text:'#e8edf5', panel:'#111827',
  rb:'#1e3a5f', rj:'#2563eb', rh:'#3b82f6', cup:'#e8edf5', coffee:'#3d2010',
  skin:'#c8a882', hair:'#1a1008', shirt:'#1a2a40', steam:'rgba(74,96,128,',
};

// ── Helpers ──
function lerp(a,b,t){return a+(b-a)*t}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function ease(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2}
function easeOut(t){return 1-Math.pow(1-t,3)}
function easeIn(t){return t*t*t}

function hexA(hex, a){
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function drawFloor(y=258){
  ctx.strokeStyle=C.floor; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(700,y); ctx.stroke();
}

function drawCup(x,y,w=22,h=30,alpha=1){
  // tapered cup
  ctx.save(); ctx.globalAlpha=alpha;
  ctx.beginPath();
  ctx.moveTo(x-w/2,y); ctx.lineTo(x-w/2+2,y+h); ctx.lineTo(x+w/2-2,y+h); ctx.lineTo(x+w/2,y);
  ctx.closePath();
  ctx.fillStyle=C.cup; ctx.fill();
  ctx.strokeStyle='#c0c8d8'; ctx.lineWidth=.8; ctx.stroke();
  // lid ellipse
  ctx.beginPath(); ctx.ellipse(x,y,w/2,3,0,0,Math.PI*2);
  ctx.fillStyle='#d0d8e8'; ctx.fill();
  // coffee surface
  ctx.beginPath(); ctx.ellipse(x,y+2,w/2-.5,2,0,0,Math.PI*2);
  ctx.fillStyle=C.coffee; ctx.globalAlpha=alpha*.8; ctx.fill();
  ctx.restore();
}

function drawSteam(x,y,t,alpha=1){
  const paths=[[-4,-8,-2,-20,-5,-32],[ 4,-8, 6,-20, 3,-32]];
  paths.forEach((p,i)=>{
    const phase=(t*0.5+i*0.65)%1;
    const a=(phase<.3?phase/.3:phase<.8?1:(1-phase)/.2)*alpha*.6;
    const dy=-phase*22;
    ctx.save(); ctx.globalAlpha=a;
    ctx.strokeStyle='#4a6080'; ctx.lineWidth=1.5; ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(x+p[0],y+p[1]+dy);
    ctx.quadraticCurveTo(x+p[2],y+p[3]+dy,x+p[4],y+p[5]+dy);
    ctx.stroke(); ctx.restore();
  });
}

function drawGlow(x,y,rx,ry,color,alpha){
  const g=ctx.createRadialGradient(x,y,0,x,y,Math.max(rx,ry));
  g.addColorStop(0,hexA(color,alpha)); g.addColorStop(1,hexA(color,0));
  ctx.save(); ctx.scale(1,ry/rx);
  ctx.beginPath(); ctx.arc(x,y*rx/ry,rx,0,Math.PI*2);
  ctx.fillStyle=g; ctx.fill(); ctx.restore();
}

function drawHUDText(lines, x, y){
  ctx.font='8px "Space Mono",monospace';
  lines.forEach((l,i)=>{
    ctx.fillStyle = i===0 ? C.accent : C.muted;
    ctx.fillText(l, x, y+i*12);
  });
}

// ══════════════════════════════════════════════════════════
// STAGE 1: 로봇팔 제조 — 8s state machine
// states: 0=move_to_spout 1=brew 2=pickup 3=move_to_shelf 4=place 5=return
// ══════════════════════════════════════════════════════════
const S1_CYCLE = 8;
const S1_STATES = [
  {name:'MOVE→SPOUT', dur:1.2},
  {name:'BREWING',    dur:2.0},
  {name:'PICKUP',     dur:0.8},
  {name:'MOVE→SHELF', dur:1.8},
  {name:'PLACE',      dur:0.8},
  {name:'RETURN',     dur:1.4},
];

function getS1State(t){
  const ct = t % S1_CYCLE;
  let acc=0;
  for(let i=0;i<S1_STATES.length;i++){
    const d=S1_STATES[i].dur;
    if(ct<acc+d) return {idx:i, p:(ct-acc)/d, name:S1_STATES[i].name};
    acc+=d;
  }
  return {idx:5,p:1,name:'RETURN'};
}

// robot arm IK-like drawing: shoulder at (sx,sy), segments
function drawRobotArm(sx, sy, ang1, ang2, ang3, hasCup){
  const L1=76, L2=60;
  // shoulder joint
  ctx.beginPath(); ctx.arc(sx,sy,9,0,Math.PI*2);
  ctx.fillStyle=C.rb; ctx.fill();
  ctx.strokeStyle=C.rj; ctx.lineWidth=1.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(sx,sy,5,0,Math.PI*2);
  ctx.fillStyle=C.rh; ctx.globalAlpha=.6; ctx.fill(); ctx.globalAlpha=1;

  const a1=ang1*Math.PI/180;
  const ex1=sx+Math.cos(a1)*L1, ey1=sy+Math.sin(a1)*L1;

  // upper arm
  ctx.save(); ctx.translate(sx,sy); ctx.rotate(a1);
  ctx.beginPath(); ctx.roundRect(-6,-2,12,L1,5);
  ctx.fillStyle=C.rb; ctx.fill();
  ctx.strokeStyle=C.rb; ctx.lineWidth=.5; ctx.stroke();
  ctx.fillStyle='#0d1f3c'; ctx.globalAlpha=.6;
  ctx.beginPath(); ctx.roundRect(-2,4,4,L1-12,2); ctx.fill(); ctx.globalAlpha=1;
  ctx.restore();

  // elbow joint
  ctx.beginPath(); ctx.arc(ex1,ey1,8,0,Math.PI*2);
  ctx.fillStyle=C.rb; ctx.fill();
  ctx.strokeStyle=C.rj; ctx.lineWidth=1.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(ex1,ey1,4,0,Math.PI*2);
  ctx.fillStyle=C.rh; ctx.globalAlpha=.7; ctx.fill(); ctx.globalAlpha=1;

  const a2=(ang1+ang2)*Math.PI/180;
  const ex2=ex1+Math.cos(a2)*L2, ey2=ey1+Math.sin(a2)*L2;

  // forearm
  ctx.save(); ctx.translate(ex1,ey1); ctx.rotate(a2);
  ctx.beginPath(); ctx.roundRect(-5,-2,10,L2,4);
  ctx.fillStyle='#253a5e'; ctx.fill();
  ctx.strokeStyle=C.rj; ctx.lineWidth=.5; ctx.stroke();
  ctx.fillStyle='#0d1f3c'; ctx.globalAlpha=.5;
  ctx.beginPath(); ctx.roundRect(-2,4,3,L2-12,1.5); ctx.fill(); ctx.globalAlpha=1;
  ctx.restore();

  // wrist joint
  ctx.beginPath(); ctx.arc(ex2,ey2,7,0,Math.PI*2);
  ctx.fillStyle=C.rb; ctx.fill();
  ctx.strokeStyle=C.accent; ctx.lineWidth=1.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(ex2,ey2,3,0,Math.PI*2);
  ctx.fillStyle=C.accent; ctx.globalAlpha=.8; ctx.fill(); ctx.globalAlpha=1;
  // wrist glow
  drawGlow(ex2,ey2,12,12,C.accent,.15);

  // gripper
  const ga=(ang1+ang2+ang3)*Math.PI/180;
  ctx.save(); ctx.translate(ex2,ey2); ctx.rotate(ga);
  ctx.beginPath(); ctx.roundRect(-10,0,20,14,3);
  ctx.fillStyle='#0d1f3c'; ctx.fill();
  ctx.strokeStyle=C.accent; ctx.lineWidth=1; ctx.stroke();
  ctx.beginPath(); ctx.roundRect(-11,12,7,18,3);
  ctx.fillStyle='#1a2a40'; ctx.fill(); ctx.strokeStyle=C.rj; ctx.lineWidth=.8; ctx.stroke();
  ctx.beginPath(); ctx.roundRect(4,12,7,18,3);
  ctx.fillStyle='#1a2a40'; ctx.fill(); ctx.stroke();
  // cup in gripper
  if(hasCup){
    ctx.save(); ctx.translate(0,26); drawCup(0,0,14,16); ctx.restore();
  }
  ctx.restore();
  return {x:ex2,y:ey2};
}

function drawCoffeeMachine(x,y){
  // body
  ctx.beginPath(); ctx.roundRect(x,y,100,148,10);
  ctx.fillStyle='#111827'; ctx.fill();
  ctx.strokeStyle=C.rb; ctx.lineWidth=1.5; ctx.stroke();
  // front panel
  ctx.beginPath(); ctx.roundRect(x+8,y+8,84,100,6);
  ctx.fillStyle='#0d1f3c'; ctx.fill();
  // display
  ctx.beginPath(); ctx.roundRect(x+14,y+14,72,35,4);
  ctx.fillStyle='#0a1628'; ctx.fill();
  ctx.font='8px "Space Mono",monospace'; ctx.fillStyle=C.accent; ctx.textAlign='center';
  ctx.fillText('BREWING...',x+50,y+30);
  ctx.font='7px "Space Mono",monospace'; ctx.fillStyle=C.rh;
  ctx.fillText('TEMP: 93°C',x+50,y+42);
  ctx.textAlign='left';
  // buttons
  [[x+22,y+70,C.rb],[x+36,y+70,C.rb],[x+50,y+70,C.accent]].forEach(([bx,by,bc])=>{
    ctx.beginPath(); ctx.arc(bx,by,5,0,Math.PI*2);
    ctx.fillStyle=C.rb; ctx.fill(); ctx.strokeStyle=bc; ctx.lineWidth=1; ctx.stroke();
  });
  // portafilter
  ctx.beginPath(); ctx.roundRect(x+34,y+85,32,6,3); ctx.fillStyle='#2a3f5f'; ctx.fill();
  ctx.beginPath(); ctx.roundRect(x+40,y+90,20,16,4);
  ctx.fillStyle='#1e2d45'; ctx.fill(); ctx.strokeStyle=C.rj; ctx.lineWidth=.8; ctx.stroke();
  // steam wand
  ctx.beginPath(); ctx.moveTo(x+95,y+45); ctx.lineTo(x+102,y+90);
  ctx.strokeStyle='#2a3f5f'; ctx.lineWidth=4; ctx.lineCap='round'; ctx.stroke();
  ctx.beginPath(); ctx.arc(x+102,y+93,5,0,Math.PI*2);
  ctx.fillStyle=C.rb; ctx.fill(); ctx.strokeStyle=C.rj; ctx.lineWidth=1; ctx.stroke();
  // drip tray
  ctx.beginPath(); ctx.roundRect(x+18,y+117,64,8,3);
  ctx.fillStyle='#1a2a40'; ctx.fill(); ctx.strokeStyle='#1e2d45'; ctx.lineWidth=.8; ctx.stroke();
  // side accents
  ctx.beginPath(); ctx.roundRect(x,y+20,4,60,2);
  ctx.fillStyle=C.rb; ctx.fill();
  ctx.beginPath(); ctx.roundRect(x+96,y+20,4,60,2);
  ctx.fillStyle=C.rb; ctx.fill();
}

function drawCupQueue(x,y){
  const cups=[{done:true},{done:true},{done:true},{done:false}];
  cups.forEach((c,i)=>{
    const cx=x+i*34;
    drawCup(cx+13,y,13,28,.8+(c.done?.2:0));
    ctx.font='7px "Space Mono",monospace'; ctx.textAlign='center';
    ctx.fillStyle=c.done?C.green:C.yellow;
    ctx.fillText(c.done?'✓':'…',cx+13,y+38);
  });
  ctx.font='9px "Space Mono",monospace'; ctx.fillStyle=C.muted;
  ctx.textAlign='left'; ctx.fillText('QUEUE',x,y-12);
}

function drawPourStream(x,y,alpha){
  if(alpha<=0) return;
  ctx.save(); ctx.globalAlpha=alpha;
  ctx.beginPath(); ctx.roundRect(x-1.5,y,3,14,1.5);
  ctx.fillStyle='#7b4f2e'; ctx.fill(); ctx.restore();
}

function drawDropParticles(x, y, t, active){
  if(!active) return;
  for(let i=0;i<6;i++){
    const phase=((t*.7+i/6))%1;
    const py=y+phase*20;
    const px=x+(Math.sin(i*2.3)*4);
    const a=(1-phase)*.7;
    ctx.save(); ctx.globalAlpha=a;
    ctx.beginPath(); ctx.arc(px,py,1.5,0,Math.PI*2);
    ctx.fillStyle='#7b4f2e'; ctx.fill(); ctx.restore();
  }
}

function drawRobotBase(x,y){
  ctx.beginPath(); ctx.ellipse(x,y+9,38,9,0,0,Math.PI*2);
  ctx.fillStyle='#0d1f3c'; ctx.fill();
  ctx.beginPath(); ctx.roundRect(x-22,y-11,44,22,5);
  ctx.fillStyle='#1a2a40'; ctx.fill(); ctx.strokeStyle=C.rb; ctx.lineWidth=1.5; ctx.stroke();
  ctx.beginPath(); ctx.ellipse(x,y-11,22,6,0,0,Math.PI*2);
  ctx.fillStyle='#1e2d45'; ctx.fill();
  // rotation ring
  ctx.beginPath(); ctx.ellipse(x,y-15,18,5,0,0,Math.PI*2);
  ctx.strokeStyle=C.rj; ctx.lineWidth=1.5; ctx.setLineDash([3,3]); ctx.stroke(); ctx.setLineDash([]);
}

// ── STAGE 1 DRAW ──
function drawStage1(t){
  const {idx, p, name} = getS1State(t);
  const ep=ease(clamp(p,0,1));
  const sp=x=>ctx.textAlign='left'; // helper setter

  // bg glow
  drawGlow(320,240,120,30,'#00d4ff',.15);

  // coffee machine at left
  drawCoffeeMachine(60,110);

  // spout position for brew / pour
  const SPOUT = {x:108, y:212}; // portafilter spout

  // cup on drip tray always
  ctx.save();
  drawCup(113,225,17,33);
  ctx.restore();

  // pour stream only during BREWING
  const brewActive = idx===1;
  drawDropParticles(SPOUT.x+1, SPOUT.y, t, brewActive);
  drawPourStream(SPOUT.x+1, SPOUT.y, brewActive ? (.5+.5*Math.sin(t*8)) : 0);

  if(brewActive){
    drawSteam(113,220,t);
  }

  // cup queue (right)
  drawCupQueue(468,150);

  // grid lines (atmosphere)
  ctx.strokeStyle=C.border; ctx.lineWidth=.5; ctx.setLineDash([4,6]);
  ctx.beginPath(); ctx.moveTo(200,100); ctx.lineTo(200,258);
  ctx.moveTo(440,100); ctx.lineTo(440,258); ctx.stroke(); ctx.setLineDash([]);

  // robot arm base center
  const ARM_BASE = {x:330, y:234};

  // state machine arm angles
  // angles: [ang1=shoulder, ang2=elbow_relative, ang3=wrist_relative]
  // target configs per state
  const configs = [
    // 0: move to spout → point toward left (coffee machine)
    {a1:-140, a2: 50, a3:-20, hasCup:false},
    // 1: brew — hold still at spout area
    {a1:-140, a2: 50, a3:-20, hasCup:false},
    // 2: pickup cup — lower down
    {a1:-130, a2: 70, a3:-10, hasCup:true},
    // 3: move to shelf — swing to right
    {a1: -60, a2: 40, a3:-20, hasCup:true},
    // 4: place — lower arm
    {a1: -50, a2: 60, a3:-20, hasCup:false},
    // 5: return — back to neutral
    {a1: -90, a2: 20, a3:  0, hasCup:false},
  ];

  let curCfg=configs[idx], nxtCfg=configs[(idx+1)%configs.length];
  const a1=lerp(curCfg.a1, nxtCfg.a1, ep);
  const a2=lerp(curCfg.a2, nxtCfg.a2, ep);
  const a3=lerp(curCfg.a3, nxtCfg.a3, ep);
  const hasCup = idx>=2&&idx<=3 || (idx===4&&p<.5) || (idx===1&&p>.9);

  drawRobotBase(ARM_BASE.x, ARM_BASE.y);
  drawRobotArm(ARM_BASE.x, ARM_BASE.y-11, a1, a2, a3, hasCup);

  // robot label
  ctx.font='9px "Space Mono",monospace'; ctx.fillStyle=C.rj; ctx.textAlign='center';
  ctx.fillText('6-DOF ROBOT ARM',ARM_BASE.x,278);
  ctx.textAlign='left';

  // shelf on right (cup placed there at state 4)
  ctx.beginPath(); ctx.roundRect(490,195,80,10,3);
  ctx.fillStyle='#1e3a5f'; ctx.fill(); ctx.strokeStyle=C.rj; ctx.lineWidth=.8; ctx.stroke();
  ctx.beginPath(); ctx.roundRect(490,205,8,53,2); ctx.fillStyle='#111827'; ctx.fill();
  ctx.beginPath(); ctx.roundRect(562,205,8,53,2); ctx.fillStyle='#111827'; ctx.fill();
  // placed cups on shelf
  if(idx>=4||(idx===4&&p>.5)){
    drawCup(530,195,16,24,.8);
    drawSteam(530,190,t,.5);
  }

  drawFloor();
  drawHUDText(['SYS:ONLINE','JOINT_VEL: 45°/s'],16,20);

  // state hud
  document.getElementById('state-hud').textContent = `STATE: ${name}\nPHASE: ${(p*100).toFixed(0)}%`;
}

// ══════════════════════════════════════════════════════════
// STAGE 2: AMR + Elevator — 7-step state machine
// 0=drive  1=door_open  2=board  3=door_close  4=ascend  5=door_open2  6=exit
// ══════════════════════════════════════════════════════════
const S2_CYCLE=14;
const S2_STATES=[
  {name:'DRIVING',    dur:3.0},
  {name:'DOOR OPEN',  dur:1.5},
  {name:'BOARDING',   dur:1.5},
  {name:'DOOR CLOSE', dur:1.0},
  {name:'ASCENDING',  dur:3.5},
  {name:'DOOR OPEN2', dur:1.5},
  {name:'EXITING',    dur:2.0},
];

function getS2State(t){
  const ct=t%S2_CYCLE; let acc=0;
  for(let i=0;i<S2_STATES.length;i++){
    const d=S2_STATES[i].dur;
    if(ct<acc+d) return{idx:i,p:(ct-acc)/d,name:S2_STATES[i].name};
    acc+=d;
  }
  return{idx:6,p:1,name:'EXITING'};
}

function drawAMR(x,y, wheelSpin){
  // chassis
  ctx.beginPath(); ctx.roundRect(x,y,105,55,10);
  ctx.fillStyle='#111827'; ctx.fill(); ctx.strokeStyle=C.rb; ctx.lineWidth=1.5; ctx.stroke();
  // detail panel
  ctx.beginPath(); ctx.roundRect(x+8,y+8,89,38,6);
  ctx.fillStyle='#0d1f3c'; ctx.fill();
  // top surface
  ctx.beginPath(); ctx.roundRect(x+6,y-3,93,10,5);
  ctx.fillStyle='#1a2a40'; ctx.fill(); ctx.strokeStyle=C.rb; ctx.lineWidth=1; ctx.stroke();
  // tray
  ctx.beginPath(); ctx.roundRect(x-6,y-17,117,14,5);
  ctx.fillStyle=C.rb; ctx.fill(); ctx.strokeStyle=C.rj; ctx.lineWidth=1; ctx.stroke();
  // cups on tray
  const cupOff=[-2,22,46,70];
  cupOff.forEach(cx=>{ drawCup(x+cx+12,y-17,12,17,.9); });
  // display
  ctx.beginPath(); ctx.roundRect(x+18,y+12,69,30,5);
  ctx.fillStyle='#0a1628'; ctx.fill(); ctx.strokeStyle=C.rj; ctx.lineWidth=1; ctx.stroke();
  ctx.font='7px "Space Mono",monospace'; ctx.fillStyle=C.accent; ctx.textAlign='center';
  ctx.fillText('NAVIGATING',x+52,y+25);
  ctx.fillStyle=C.green; ctx.fillText('3F →',x+52,y+36);
  ctx.textAlign='left';
  // LED strip
  ctx.beginPath(); ctx.roundRect(x+8,y+9,89,3,1.5);
  ctx.fillStyle=C.rj; ctx.globalAlpha=.5; ctx.fill(); ctx.globalAlpha=1;
  // LiDAR
  ctx.beginPath(); ctx.arc(x+52,y-5,6,0,Math.PI*2);
  ctx.fillStyle='#0d1f3c'; ctx.fill(); ctx.strokeStyle=C.accent; ctx.lineWidth=1; ctx.stroke();
  ctx.beginPath(); ctx.arc(x+52,y-5,3,0,Math.PI*2);
  ctx.fillStyle=C.accent; ctx.globalAlpha=.8; ctx.fill(); ctx.globalAlpha=1;
  // LiDAR sweep
  const la=wheelSpin*0.3;
  ctx.save(); ctx.translate(x+52,y-5);
  ctx.rotate(la); ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(18,-4);
  ctx.strokeStyle=C.accent; ctx.lineWidth=.8; ctx.globalAlpha=.5; ctx.stroke(); ctx.restore();

  // wheels
  [[x+16,y+56],[x+89,y+56]].forEach(([wx,wy])=>{
    ctx.beginPath(); ctx.arc(wx,wy,16,0,Math.PI*2);
    ctx.fillStyle='#0d1a2e'; ctx.fill(); ctx.strokeStyle=C.rb; ctx.lineWidth=2; ctx.stroke();
    ctx.save(); ctx.translate(wx,wy); ctx.rotate(wheelSpin);
    ctx.beginPath(); ctx.moveTo(-12,0); ctx.lineTo(12,0);
    ctx.moveTo(0,-12); ctx.lineTo(0,12);
    ctx.strokeStyle=C.rj; ctx.lineWidth=1; ctx.globalAlpha=.5; ctx.stroke(); ctx.restore();
    ctx.beginPath(); ctx.arc(wx,wy,5,0,Math.PI*2);
    ctx.fillStyle=C.rb; ctx.fill(); ctx.strokeStyle=C.rh; ctx.lineWidth=.8; ctx.stroke();
  });
  // motion blur trail
  drawGlow(x+55,y+48,55,6,C.rj,.07);
}

function drawElevator(ex,ey, carY, doorOpen){
  const W=150,H=228;
  // shaft outer
  ctx.beginPath(); ctx.roundRect(ex,ey,W,H,6);
  ctx.fillStyle='#0d1f3c'; ctx.fill(); ctx.strokeStyle=C.rb; ctx.lineWidth=1.5; ctx.stroke();
  // shaft interior
  ctx.beginPath(); ctx.roundRect(ex+8,ey+8,W-16,H-16,4);
  ctx.fillStyle='#080e1a'; ctx.fill();
  // floor markers
  const floors=[{y:76,f:'3F',col:C.accent},{y:145,f:'2F',col:C.muted},{y:215,f:'1F',col:C.muted}];
  floors.forEach(({y:fy,f,col})=>{
    ctx.strokeStyle=C.rb; ctx.lineWidth=.5; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(ex+8,ey+fy); ctx.lineTo(ex+W-8,ey+fy); ctx.stroke(); ctx.setLineDash([]);
    ctx.font='9px "Space Mono",monospace'; ctx.fillStyle=col; ctx.textAlign='right';
    ctx.fillText(f,ex-4,ey+fy+4);
  });
  ctx.textAlign='left';

  // elevator car
  const carH=88, carW=W-16;
  const carTop=ey+carY;
  ctx.beginPath(); ctx.roundRect(ex+8,carTop,carW,carH,4);
  ctx.fillStyle='#111827'; ctx.fill(); ctx.strokeStyle=C.rb; ctx.lineWidth=1; ctx.stroke();
  ctx.beginPath(); ctx.roundRect(ex+13,carTop+5,carW-10,carH-10,3);
  ctx.fillStyle='#0d1f3c'; ctx.globalAlpha=.8; ctx.fill(); ctx.globalAlpha=1;

  // floor indicator panel inside car
  ctx.beginPath(); ctx.roundRect(ex+16,carTop+12,30,50,4);
  ctx.fillStyle='#0a1628'; ctx.fill(); ctx.strokeStyle=C.rb; ctx.lineWidth=.8; ctx.stroke();
  ctx.font='8px "Space Mono",monospace'; ctx.fillStyle=C.accent; ctx.textAlign='center';
  ctx.fillText('▲',ex+31,carTop+28);
  ctx.font='10px "Space Mono",monospace'; ctx.font='bold 10px "Space Mono",monospace';
  const floorNum = carY < 90 ? '3F' : carY < 160 ? '2F' : '1F';
  ctx.fillText(floorNum,ex+31,carTop+42);
  ctx.beginPath(); ctx.arc(ex+31,carTop+54,4,0,Math.PI*2);
  ctx.fillStyle=C.green; ctx.globalAlpha=.9; ctx.fill(); ctx.globalAlpha=1;

  // doors (slide: 0=closed, 1=open)
  const doorSlide = clamp(doorOpen,0,1);
  const dh=carH, dw=(carW-2)/2;
  // left door (slides left)
  ctx.save();
  ctx.beginPath(); ctx.rect(ex+8, carTop, carW, carH);
  ctx.clip();
  ctx.beginPath(); ctx.roundRect(ex+8-doorSlide*dw, carTop, dw, dh, 3);
  ctx.fillStyle='#1a2a40'; ctx.fill(); ctx.strokeStyle=C.rj; ctx.lineWidth=.8; ctx.stroke();
  // right door (slides right)
  ctx.beginPath(); ctx.roundRect(ex+8+dw+doorSlide*dw, carTop, dw, dh, 3);
  ctx.fillStyle='#1a2a40'; ctx.fill(); ctx.strokeStyle=C.rj; ctx.lineWidth=.8; ctx.stroke();
  ctx.restore();
  // center line
  if(doorSlide<.9){
    ctx.beginPath(); ctx.moveTo(ex+8+dw,carTop+8); ctx.lineTo(ex+8+dw,carTop+dh-8);
    ctx.strokeStyle=C.rj; ctx.lineWidth=.8; ctx.globalAlpha=.4; ctx.stroke(); ctx.globalAlpha=1;
  }
  ctx.textAlign='left';
}

function drawStage2(t){
  const {idx,p,name}=getS2State(t);
  const ep=ease(clamp(p,0,1));

  drawFloor();

  // path dashes on floor
  ctx.strokeStyle=C.rb; ctx.lineWidth=1.5; ctx.setLineDash([8,6]);
  ctx.beginPath(); ctx.moveTo(80,248); ctx.lineTo(420,248); ctx.stroke(); ctx.setLineDash([]);
  ctx.font='8px "Space Mono",monospace'; ctx.fillStyle=C.rj; ctx.globalAlpha=.6;
  ctx.textAlign='center'; ctx.fillText('AMR PATH',240,244); ctx.globalAlpha=1; ctx.textAlign='left';

  const EL_X=500, EL_Y=30;

  // AMR position
  let amrX=80;
  const amrBase=80, amrTarget=EL_X-115+8;
  if(idx===0){ amrX=lerp(amrBase,amrTarget,easeOut(ep)); }
  else if(idx===1||idx===2){ amrX=amrTarget; }
  else if(idx===2){ amrX=lerp(amrTarget, EL_X+8, ep); }
  else if(idx>=3&&idx<=5){ amrX=EL_X+8; }
  else if(idx===6){ amrX=lerp(EL_X+8, EL_X+180, easeIn(ep)); }
  else { amrX=amrTarget; }
  // board state: move into elevator
  if(idx===2) amrX=lerp(amrTarget, EL_X+16, ep);

  const wheelSpin = t*2.5;

  // inside elevator (after boarding)
  const insideElevator = idx>=2&&idx<=5;

  // elevator car Y: starts at 1F (~ey+140), goes to 3F (~ey+0)
  let carY=140;
  if(idx<=3) carY=140;
  else if(idx===4) carY=lerp(140,0,easeOut(ep));
  else carY=0;

  // door open state
  let doorOpen=0;
  if(idx===1) doorOpen=easeOut(ep);
  else if(idx===2) doorOpen=1;
  else if(idx===3) doorOpen=1-easeOut(ep);
  else if(idx===4) doorOpen=0;
  else if(idx===5) doorOpen=easeOut(ep);
  else if(idx===6) doorOpen=1;
  else doorOpen=0;

  // draw elevator
  drawElevator(EL_X, EL_Y, carY, doorOpen);

  // AMR inside elevator or on floor
  if(insideElevator){
    ctx.save();
    ctx.beginPath(); ctx.rect(EL_X+8, EL_Y+8+carY, 134, 88); ctx.clip();
    drawAMR(EL_X+12, EL_Y+carY+88-72, wheelSpin);
    ctx.restore();
  }
  if(idx===0||(idx===1)||(idx===6)){
    drawAMR(amrX, 188, wheelSpin);
  }
  if(idx===2){
    // transition into elevator
    if(p<.5){
      drawAMR(lerp(amrTarget,EL_X+12,p*2), 188, wheelSpin);
    } else {
      ctx.save();
      ctx.beginPath(); ctx.rect(EL_X+8, EL_Y+8+carY, 134, 88); ctx.clip();
      drawAMR(EL_X+12, EL_Y+carY+88-72, wheelSpin);
      ctx.restore();
    }
  }

  drawHUDText(['AMR:ACTIVE','SPEED: 0.8m/s','DEST: FLOOR 3'],16,20);
  document.getElementById('state-hud').textContent=`STATE: ${name}\nFLOOR: ${carY<50?'3F':carY<120?'2F':'1F'}\nPHASE: ${(p*100).toFixed(0)}%`;
}

// STAGE 3: 책상 배달
// 0=enter  1=extend  2=place  3=retract  4=wait
// ══════════════════════════════════════════════════════════
const S3_CYCLE=7;
const S3_STATES=[
  {name:'ENTERING',  dur:1.5},
  {name:'EXTENDING', dur:1.5},
  {name:'PLACING',   dur:1.2},
  {name:'RETRACT',   dur:1.5},
  {name:'IDLE',      dur:1.3},
];

function getS3State(t){
  const ct=t%S3_CYCLE; let acc=0;
  for(let i=0;i<S3_STATES.length;i++){
    const d=S3_STATES[i].dur;
    if(ct<acc+d) return{idx:i,p:(ct-acc)/d,name:S3_STATES[i].name};
    acc+=d;
  }
  return{idx:4,p:1,name:'IDLE'};
}

function drawDesk(x,y,w){

  // monitor

  ctx.beginPath(); ctx.roundRect(mx,y-78,90,68,5);

  ctx.beginPath(); ctx.roundRect(mx+28,y-2,34,4,2); ctx.fillStyle='#1a2a40'; ctx.fill();
  // keyboard
  ctx.beginPath(); ctx.roundRect(x+152,y-5,70,10,3);
  ctx.fillStyle='#0d1f3c'; ctx.fill(); ctx.strokeStyle='#1e2d45'; ctx.lineWidth=.8; ctx.stroke();
  // mouse
  ctx.beginPath(); ctx.roundRect(x+232,y-7,22,14,7);
  ctx.fillStyle='#0d1f3c'; ctx.fill(); ctx.stroke();
}

function drawSeatedPerson(x,y){

  ctx.beginPath(); ctx.roundRect(x+17,y-106,52,12,6); ctx.fillStyle=C.hair; ctx.fill();
  // eye
  ctx.beginPath(); ctx.ellipse(x+32,y-78,5,4,0,0,Math.PI*2);
  ctx.fillStyle='#e8edf5'; ctx.fill();
  ctx.beginPath(); ctx.arc(x+32,y-78,2.5,0,Math.PI*2);

  ctx.beginPath(); ctx.moveTo(x+27,y-84); ctx.quadraticCurveTo(x+32,y-87,x+37,y-84);
  ctx.strokeStyle=C.hair; ctx.lineWidth=1.5; ctx.lineCap='round'; ctx.stroke();
  // smile
  ctx.beginPath(); ctx.moveTo(x+35,y-62); ctx.quadraticCurveTo(x+40,y-58,x+45,y-62);
  ctx.strokeStyle='#8a6040'; ctx.lineWidth=1.2; ctx.stroke();

  ctx.quadraticCurveTo(x-30,y+1,x-35,y); ctx.strokeStyle=C.skin; ctx.lineWidth=10; ctx.lineCap='round'; ctx.stroke();
  ctx.beginPath(); ctx.ellipse(x-36,y,10,7,0,0,Math.PI*2); ctx.fillStyle=C.skin; ctx.fill();

function drawCompactAMR(x,y){
  ctx.beginPath(); ctx.roundRect(x,y,100,50,8);
  ctx.fillStyle='#111827'; ctx.fill(); ctx.strokeStyle=C.rb; ctx.lineWidth=1.5; ctx.stroke();
  ctx.beginPath(); ctx.roundRect(x+8,y+8,84,34,5); ctx.fillStyle='#0d1f3c'; ctx.fill();
  ctx.beginPath(); ctx.roundRect(x+14,y+13,58,22,4);

  ctx.fillText('PLACING',x+43,y+24); ctx.fillStyle=C.green; ctx.fillText('DESK MODE',x+43,y+33);

  [[x+20,y+46],[x+80,y+46]].forEach(([wx,wy])=>{
    ctx.beginPath(); ctx.arc(wx,wy,13,0,Math.PI*2); ctx.fillStyle='#0d1a2e'; ctx.fill(); ctx.strokeStyle=C.rb; ctx.lineWidth=1.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(wx,wy,5,0,Math.PI*2); ctx.fillStyle=C.rb; ctx.fill(); ctx.strokeStyle=C.rh; ctx.lineWidth=.8; ctx.stroke();
  });
  // tray
  ctx.beginPath(); ctx.roundRect(x-12,y-10,118,10,4); ctx.fillStyle=C.rb; ctx.fill(); ctx.strokeStyle=C.rj; ctx.lineWidth=1; ctx.stroke();
  // cups on tray
  [0,24,48].forEach(cx=>{ drawCup(x+cx+6,y-10,12,20,.8); });

function drawExtendingArm(amrX, amrY, extendP, hasCup){
  const baseX=amrX+100, baseY=amrY-5;
  const armLen=lerp(0,130,easeOut(extendP));
  // arm rect
  ctx.beginPath(); ctx.roundRect(baseX, baseY-5, armLen, 10, 4);
  ctx.fillStyle='#253a5e'; ctx.fill(); ctx.strokeStyle=C.rj; ctx.lineWidth=.8; ctx.stroke();
  // vertical segment
  const vertLen=lerp(0,28,easeOut(extendP));
  const vertX=baseX+armLen;
  ctx.beginPath(); ctx.roundRect(vertX-5, baseY-5, 10, vertLen, 4);
  ctx.fillStyle=C.rb; ctx.fill(); ctx.strokeStyle=C.rj; ctx.lineWidth=.8; ctx.stroke();
  // cup at end
  if(hasCup){
    drawCup(vertX, baseY+vertLen, 18,26);
    if(extendP>.5) {
      ctx.font='12px "Space Mono",monospace'; ctx.fillStyle=C.accent; ctx.textAlign='center';
      ctx.globalAlpha=.8; ctx.fillText('↓',vertX,baseY+vertLen-32); ctx.globalAlpha=1; ctx.textAlign='left';
    }
  }
}

function drawStage3(t){
  const {idx,p,name}=getS3State(t);
  const ep=ease(clamp(p,0,1));

  drawFloor();

  const DESK_X=200, DESK_Y=210, DESK_W=440;
  drawDesk(DESK_X,DESK_Y,DESK_W);
  drawSeatedPerson(DESK_X+320,DESK_Y);

  // AMR position
  let amrX=-120;
  if(idx===0) amrX=lerp(-120,40,easeOut(ep));
  else amrX=40;
  const amrY=195;
  drawCompactAMR(amrX,amrY);

  // arm extension
  let extP=0;
  if(idx===1) extP=easeOut(ep);
  else if(idx===2) extP=1;
  else if(idx===3) extP=1-easeOut(ep);
  const hasCupArm = (idx===1||idx===2||(idx===3&&p<.5));
  drawExtendingArm(amrX, amrY, extP, hasCupArm);

  // placed cup on desk (appears at place state)
  const cupAlpha = idx===2&&p>.5 ? (p-.5)*2 : idx>=3?1:0;
  if(cupAlpha>0){
    ctx.save(); ctx.globalAlpha=cupAlpha;
    drawCup(DESK_X+90,DESK_Y,18,26);
    if(cupAlpha>.5) drawSteam(DESK_X+90,DESK_Y-4,t,cupAlpha);
    ctx.restore();
  }
  // extra placed cups already there
  drawCup(DESK_X+60,DESK_Y,16,24,.5);

  // badge
  ctx.beginPath(); ctx.roundRect(14,14,155,24,6);
  ctx.fillStyle='#0d1f3c'; ctx.fill(); ctx.strokeStyle=C.rj; ctx.lineWidth=1; ctx.stroke();
  ctx.font='9px "Space Mono",monospace'; ctx.fillStyle=C.accent; ctx.textAlign='center';
  ctx.fillText('CASE A: DESK DELIVERY',90,30); ctx.textAlign='left';
  ctx.font='8px "Space Mono",monospace'; ctx.fillStyle=C.muted; ctx.fillText('MODE: NON-CONTACT',16,52);

  document.getElementById('state-hud').textContent=`STATE: ${name}\nPHASE: ${(p*100).toFixed(0)}%`;
}

// STAGE 4: 손 전달 — handoff state machine
// 0=approach  1=extend  2=handoff  3=retract  4=done
// ══════════════════════════════════════════════════════════
const S4_CYCLE=8;
const S4_STATES=[
  {name:'APPROACH',  dur:1.5},
  {name:'EXTEND',    dur:1.5},
  {name:'HANDOFF',   dur:2.0},
  {name:'RETRACT',   dur:1.5},
  {name:'COMPLETE',  dur:1.5},
];

function getS4State(t){
  const ct=t%S4_CYCLE; let acc=0;
  for(let i=0;i<S4_STATES.length;i++){
    const d=S4_STATES[i].dur;
    if(ct<acc+d) return{idx:i,p:(ct-acc)/d,name:S4_STATES[i].name};
    acc+=d;
  }
  return{idx:4,p:1,name:'COMPLETE'};
}

function drawHuman4(x,y, armReach){
  // legs
  [[-20,0],[20,0]].forEach(([lx])=>{
    ctx.beginPath(); ctx.moveTo(x+lx+14,y); ctx.quadraticCurveTo(x+lx+12,y-28,x+lx+18,y-43);

  });
  // torso
  ctx.beginPath();
  ctx.moveTo(x-10,y-43); ctx.quadraticCurveTo(x-12,y-78,x+8,y-90);
  ctx.quadraticCurveTo(x+20,y-96,x+31,y-96); ctx.quadraticCurveTo(x+46,y-96,x+56,y-88);
  ctx.quadraticCurveTo(x+70,y-76,x+68,y-43); ctx.closePath();
  ctx.fillStyle='#1a2a40'; ctx.fill(); ctx.strokeStyle='#253a5e'; ctx.lineWidth=1; ctx.stroke();
  // collar
  ctx.beginPath(); ctx.moveTo(x+11,y-90); ctx.quadraticCurveTo(x+20,y-83,x+29,y-90);
  ctx.strokeStyle='#253a5e'; ctx.lineWidth=1.5; ctx.stroke();
  // neck
  ctx.beginPath(); ctx.roundRect(x+14,y-106,20,18,5); ctx.fillStyle=C.skin; ctx.fill();
  // head
  ctx.beginPath(); ctx.ellipse(x+24,y-130,28,32,0,0,Math.PI*2); ctx.fillStyle=C.skin; ctx.fill();
  // ear
  ctx.beginPath(); ctx.ellipse(x-4,y-130,7,10,0,0,Math.PI*2); ctx.fillStyle='#b89268'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(x-2,y-130,4,7,0,0,Math.PI*2); ctx.fillStyle=C.skin; ctx.fill();
  // hair
  ctx.beginPath(); ctx.moveTo(x-4,y-158); ctx.quadraticCurveTo(x,y-168,x+24,y-170);
  ctx.quadraticCurveTo(x+48,y-168,x+52,y-158); ctx.quadraticCurveTo(x+50,y-164,x+24,y-165);
  ctx.quadraticCurveTo(x-2,y-164,x-4,y-158); ctx.closePath();
  ctx.fillStyle=C.hair; ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+24,y-162,28,12,0,0,Math.PI*2); ctx.fillStyle=C.hair; ctx.fill();
  // eyes (looking left toward robot)
  ctx.beginPath(); ctx.ellipse(x+10,y-134,6,5,0,0,Math.PI*2); ctx.fillStyle='#e8edf5'; ctx.fill();
  ctx.beginPath(); ctx.arc(x+9,y-134,3,0,Math.PI*2); ctx.fillStyle='#2a1f14'; ctx.fill();
  ctx.beginPath(); ctx.arc(x+8,y-135,1,0,Math.PI*2); ctx.fillStyle='#e8edf5'; ctx.globalAlpha=.6; ctx.fill(); ctx.globalAlpha=1;
  ctx.beginPath(); ctx.ellipse(x+30,y-134,6,5,0,0,Math.PI*2); ctx.fillStyle='#e8edf5'; ctx.fill();
  ctx.beginPath(); ctx.arc(x+29,y-134,3,0,Math.PI*2); ctx.fillStyle='#2a1f14'; ctx.fill();
  // eyebrows attentive
  ctx.beginPath(); ctx.moveTo(x+4,y-141); ctx.quadraticCurveTo(x+10,y-144,x+16,y-141);
  ctx.strokeStyle=C.hair; ctx.lineWidth=1.5; ctx.lineCap='round'; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+24,y-141); ctx.quadraticCurveTo(x+30,y-143,x+36,y-140);
  ctx.stroke();
  // smile
  ctx.beginPath(); ctx.moveTo(x+12,y-116); ctx.quadraticCurveTo(x+22,y-110,x+32,y-116);
  ctx.strokeStyle='#8a6040'; ctx.lineWidth=1.5; ctx.stroke();

  // right arm reaching toward robot (left)
  const reach=clamp(armReach,0,1);
  // upper arm goes left
  const ux=x-10, uy=y-67;
  const fx=ux-lerp(0,50,reach), fy=uy+lerp(0,10,reach);
  const wx=fx-lerp(0,58,reach), wy=fy+lerp(0,4,reach);

  ctx.beginPath(); ctx.moveTo(ux,uy); ctx.quadraticCurveTo(ux-20,uy+10,fx,fy);
  ctx.strokeStyle=C.skin; ctx.lineWidth=14; ctx.lineCap='round'; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(fx,fy); ctx.quadraticCurveTo(fx-30,fy+8,wx,wy);
  ctx.lineWidth=11; ctx.stroke();
  // wrist ellipse
  ctx.beginPath(); ctx.ellipse(wx,wy,9,8,-.2,0,Math.PI*2); ctx.fillStyle=C.skin; ctx.fill();
  // open palm
  const px=wx-12, py=wy-2;
  ctx.beginPath(); ctx.ellipse(px,py,16,11,-.2,0,Math.PI*2); ctx.fillStyle=C.skin; ctx.fill();
  // fingers
  [[-10,-8],[- 3,-12],[5,-13],[12,-11]].forEach(([fx2,fy2])=>{
    ctx.beginPath(); ctx.moveTo(px+fx2,py+fy2); ctx.lineTo(px+fx2-4,py+fy2-10);
    ctx.strokeStyle=C.skin; ctx.lineWidth=6; ctx.lineCap='round'; ctx.stroke();
  });
  // thumb
  ctx.beginPath(); ctx.moveTo(px-14,py+4); ctx.lineTo(px-22,py+10);
  ctx.lineWidth=6; ctx.stroke();
}

function drawHorizontalArm(amrX, amrY, extendP, hasCup, t, glowOn){
  const baseX=amrX+100, baseY=amrY-4;
  const maxLen=170;
  const armLen=lerp(0,maxLen,easeOut(extendP));
  const tipX=baseX+armLen;

  // shoulder
  ctx.beginPath(); ctx.arc(baseX,baseY,10,0,Math.PI*2);
  ctx.fillStyle=C.rb; ctx.fill(); ctx.strokeStyle=C.rj; ctx.lineWidth=1.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(baseX,baseY,5,0,Math.PI*2); ctx.fillStyle=C.rh; ctx.globalAlpha=.6; ctx.fill(); ctx.globalAlpha=1;

  // upper arm
  const mid=baseX+armLen*.5;
  ctx.beginPath(); ctx.roundRect(baseX,baseY-7,armLen*.5,14,6);
  ctx.fillStyle=C.rb; ctx.fill(); ctx.strokeStyle=C.rb; ctx.lineWidth=.5; ctx.stroke();
  // groove
  ctx.beginPath(); ctx.roundRect(baseX+4,baseY-2,armLen*.5-8,4,2); ctx.fillStyle='#0d1f3c'; ctx.globalAlpha=.6; ctx.fill(); ctx.globalAlpha=1;

  // elbow joint
  ctx.beginPath(); ctx.arc(mid,baseY,9,0,Math.PI*2); ctx.fillStyle=C.rb; ctx.fill(); ctx.strokeStyle=C.rj; ctx.lineWidth=1.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(mid,baseY,4.5,0,Math.PI*2); ctx.fillStyle=C.rh; ctx.globalAlpha=.7; ctx.fill(); ctx.globalAlpha=1;

  // forearm
  ctx.beginPath(); ctx.roundRect(mid,baseY-6.5,armLen*.5,13,5.5);
  ctx.fillStyle='#253a5e'; ctx.fill(); ctx.strokeStyle=C.rj; ctx.lineWidth=.8; ctx.stroke();
  ctx.beginPath(); ctx.roundRect(mid+4,baseY-2,armLen*.5-8,4,2); ctx.fillStyle='#0d1f3c'; ctx.globalAlpha=.5; ctx.fill(); ctx.globalAlpha=1;

  // wrist joint with glow
  const wglow = glowOn ? (.5+.5*Math.sin(t*4)) : 0;
  if(wglow>0){
    drawGlow(tipX,baseY,20,20,C.accent,wglow*.4);
  }
  ctx.beginPath(); ctx.arc(tipX,baseY,8,0,Math.PI*2); ctx.fillStyle=C.rb; ctx.fill();
  ctx.strokeStyle=C.accent; ctx.lineWidth=1.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(tipX,baseY,4,0,Math.PI*2); ctx.fillStyle=C.accent; ctx.globalAlpha=.8; ctx.fill(); ctx.globalAlpha=1;

  // gripper
  ctx.beginPath(); ctx.roundRect(tipX-2,baseY-6,22,12,3);
  ctx.fillStyle='#0d1f3c'; ctx.fill(); ctx.strokeStyle=C.accent; ctx.lineWidth=1; ctx.stroke();
  // upper finger
  ctx.beginPath();
  ctx.moveTo(tipX+2,baseY-6); ctx.lineTo(tipX,baseY-20); ctx.quadraticCurveTo(tipX-1,baseY-26,tipX+4,baseY-28);
  ctx.quadraticCurveTo(tipX+10,baseY-30,tipX+12,baseY-24); ctx.lineTo(tipX+12,baseY-6);
  ctx.fillStyle='#1a2a40'; ctx.fill(); ctx.strokeStyle=C.rj; ctx.lineWidth=.8; ctx.stroke();
  // lower finger
  ctx.beginPath();
  ctx.moveTo(tipX+2,baseY+6); ctx.lineTo(tipX,baseY+20); ctx.quadraticCurveTo(tipX-1,baseY+26,tipX+4,baseY+28);
  ctx.quadraticCurveTo(tipX+10,baseY+30,tipX+12,baseY+24); ctx.lineTo(tipX+12,baseY+6);
  ctx.fillStyle='#1a2a40'; ctx.fill(); ctx.strokeStyle=C.rj; ctx.lineWidth=.8; ctx.stroke();

  // cup in gripper
  if(hasCup){
    drawCup(tipX+8, baseY-14, 18,26);
    if(glowOn) drawSteam(tipX+8, baseY-18, t, .8);
  }

  // particles during handoff
  if(glowOn&&hasCup){
    for(let i=0;i<8;i++){
      const phase=((t*.8+i/8))%1;
      const pa=i*Math.PI*.25;
      const pr=phase*28;
      const px2=tipX+8+Math.cos(pa)*pr, py2=baseY-14+Math.sin(pa)*pr;
      const a=(1-phase)*.7;
      ctx.save(); ctx.globalAlpha=a;
      ctx.beginPath(); ctx.arc(px2,py2,1.5,0,Math.PI*2);
      ctx.fillStyle=C.accent; ctx.fill(); ctx.restore();
    }
  }
}

function drawStage4(t){
  const {idx,p,name}=getS4State(t);
  const ep=ease(clamp(p,0,1));

  // bg glow at handoff zone
  if(idx===2){
    drawGlow(350,196,90,30,'#00d4ff',.15+.1*Math.sin(t*4));
  }
  drawFloor();

  const AMR_Y=195;
  let amrX=40;
  if(idx===0) amrX=lerp(-120,40,easeOut(ep));

  // compact AMR with horizontal arm mount
  drawCompactAMR(amrX,AMR_Y);

  // arm extension
  let extP=0;
  if(idx===0) extP=0;
  else if(idx===1) extP=easeOut(ep);
  else if(idx===2) extP=1;
  else if(idx===3) extP=1-easeOut(ep);

  const hasCupArm = idx>=1&&idx<=2 || (idx===3&&p<.6);
  const glowOn = idx===2;
  drawHorizontalArm(amrX,AMR_Y,extP,hasCupArm,t,glowOn);

  // human arm reach
  const humanReach = idx===1?easeOut(ep): idx===2?1: idx===3?1-easeOut(ep)*.4:0;
  drawHuman4(490,258, humanReach);

  // handoff signal particles between robot and human
  if(idx===2){
    const handoffX=amrX+100+170+8;
    [
      {r:8,emoji:'☕',dx:0,dy:-36},
      {r:0,emoji:'✨',dx:18,dy:-56},
      {r:0,emoji:'💬',dx:-18,dy:-49},
    ].forEach(({r,emoji,dx,dy},i)=>{
      const phase=((t*.5+i*.7))%1;
      const a=(phase<.2?phase/.2:phase<.8?1:(1-phase)/.2)*.8;
      const fly=-phase*36;
      ctx.save(); ctx.globalAlpha=a;
      if(r>0){
        ctx.beginPath(); ctx.arc(handoffX+dx,AMR_Y-14+dy+fly,r,0,Math.PI*2);
        ctx.strokeStyle=C.accent; ctx.lineWidth=1.5; ctx.stroke();
      }
      ctx.font=`${11+r}px serif`; ctx.textAlign='center';
      ctx.fillText(emoji,handoffX+dx,AMR_Y-14+dy+fly+4);
      ctx.restore();
    });
  }

  // speech bubbles
  // robot
  ctx.beginPath(); ctx.roundRect(amrX-10,80,130,34,8);
  ctx.fillStyle='#111827'; ctx.fill(); ctx.strokeStyle=C.rj; ctx.lineWidth=1; ctx.stroke();
  ctx.font='10px "Noto Sans KR",sans-serif'; ctx.fillStyle=C.text; ctx.textAlign='center';
  ctx.fillText('커피 드세요!',amrX+55,95);
  ctx.font='8px "Space Mono",monospace'; ctx.fillStyle=C.accent;
  ctx.fillText('HRI:HANDOFF',amrX+55,108); ctx.textAlign='left';
  // pointer
  ctx.beginPath(); ctx.moveTo(amrX+108,114); ctx.lineTo(amrX+101,124); ctx.lineTo(amrX+116,124);
  ctx.fillStyle='#111827'; ctx.fill(); ctx.strokeStyle=C.rj; ctx.lineWidth=1; ctx.stroke();

  // human speech bubble (idx 2+)
  if(idx>=2){
    ctx.beginPath(); ctx.roundRect(548,80,106,34,8);
    ctx.fillStyle='#111827'; ctx.fill(); ctx.strokeStyle=C.rb; ctx.lineWidth=1; ctx.stroke();
    ctx.font='10px "Noto Sans KR",sans-serif'; ctx.fillStyle=C.text; ctx.textAlign='center';
    ctx.fillText('감사합니다!',601,96);
    ctx.font='8px "Space Mono",monospace'; ctx.fillStyle=C.green; ctx.fillText('🙏 RECEIVED',601,109);
    ctx.textAlign='left';
    ctx.beginPath(); ctx.moveTo(560,114); ctx.lineTo(553,124); ctx.lineTo(568,124);
    ctx.fillStyle='#111827'; ctx.fill(); ctx.strokeStyle=C.rb; ctx.lineWidth=1; ctx.stroke();
  }

  // badge
  ctx.beginPath(); ctx.roundRect(14,14,160,24,6);
  ctx.fillStyle='#0d1f3c'; ctx.fill(); ctx.strokeStyle=C.green; ctx.lineWidth=1; ctx.stroke();
  ctx.font='9px "Space Mono",monospace'; ctx.fillStyle=C.green; ctx.textAlign='center';
  ctx.fillText('CASE B: HAND DELIVERY',94,30); ctx.textAlign='left';
  ctx.font='8px "Space Mono",monospace'; ctx.fillStyle=C.muted; ctx.fillText('MODE: DIRECT HRI',16,52);
  ctx.fillText('FORCE: 0.3N',16,64);

  document.getElementById('state-hud').textContent=`STATE: ${name}\nPHASE: ${(p*100).toFixed(0)}%`;
}

// ══════════════════════════════════════════════════════════
// STAGE META
// ══════════════════════════════════════════════════════════
const stageMeta = [
  {
    label:'STAGE 01 / 04', title:'6축 로봇팔이 커피를 제조합니다',
    chips:[{t:'● 로봇팔 가동',s:'active'},{t:'● 에스프레소 추출',s:'active'},{t:'● 스티밍',s:'active'},{t:'○ 컵 적재 대기',s:'pending'}],
  },
  {
    label:'STAGE 02 / 04', title:'AMR이 엘리베이터를 통해 3층으로 이동합니다',
    chips:[{t:'● 로봇팔 완료',s:'active'},{t:'● AMR 주행 중',s:'active'},{t:'● 엘리베이터 탑승',s:'active'},{t:'○ 3F 도착 대기',s:'pending'}],
  },
  {
    label:'STAGE 03 / 04', title:'케이스 A — 로봇이 책상 위에 커피를 내려놓습니다',
    chips:[{t:'● 제조 완료',s:'active'},{t:'● AMR 도착',s:'active'},{t:'● 책상 배달',s:'active'},{t:'○ 수령 확인 대기',s:'pending'}],
  },
  {
    label:'STAGE 04 / 04', title:'케이스 B — 로봇팔이 사람 손에 직접 커피를 전달합니다',
    chips:[{t:'● 제조 완료',s:'active'},{t:'● AMR 도착',s:'active'},{t:'● 직접 전달 HRI',s:'active'},{t:'● 수령 확인',s:'active'}],
  },
];

const drawFns=[drawStage1,drawStage2,drawStage3,drawStage4];

function loop(ts){
  if(!lastTs) lastTs=ts;
  const dt=(ts-lastTs)/1000; lastTs=ts;
  stageT+=dt;

  ctx.clearRect(0,0,700,300);
  ctx.fillStyle=C.bg; ctx.fillRect(0,0,700,300);
  // grid floor atmosphere
  ctx.save(); ctx.globalAlpha=.3;
  ctx.strokeStyle=C.floor; ctx.lineWidth=.5;
  for(let gx=0;gx<700;gx+=40){
    ctx.beginPath(); ctx.moveTo(gx,178); ctx.lineTo(gx,258); ctx.stroke();
  }
  ctx.restore();

  drawFns[currentStage](stageT);
  animId=requestAnimationFrame(loop);
}

function goTo(i){
  if(i<0||i>=4) return;
  currentStage=i; stageT=0; lastTs=null;
  document.getElementById('scene-label').textContent=stageMeta[i].label;
  document.getElementById('scene-title').textContent=stageMeta[i].title;
  document.getElementById('btn-prev').disabled=i===0;
  const nb=document.getElementById('btn-next');
  nb.disabled=i===3; nb.textContent=i===3?'DONE ✓':'NEXT →';
  document.getElementById('status-bar').innerHTML=stageMeta[i].chips.map(c=>
    `<div class="chip ${c.s}"><span class="dot"></span>${c.t}</div>`
  ).join('');
  document.querySelectorAll('.stage-btn').forEach((b,idx)=>{
    b.classList.toggle('active',idx===i);
    b.classList.toggle('done',idx<i);
  });
}

// kick off
goTo(0);
if(animId) cancelAnimationFrame(animId);
animId=requestAnimationFrame(loop);
</script>
